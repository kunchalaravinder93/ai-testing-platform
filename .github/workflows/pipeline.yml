name: AI Testing Intelligence Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  intelligence-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Debug - List Files
        run: ls -R

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn

      - name: Run Performance Test (JMeter Mock)
        run: |
          # In a real scenario, you'd run: jmeter -n -t jmeter/test-plan.jmx -l data/results.jtl
          # For this demo, we use the pre-synced mock data in the repo.
          echo "Simulating JMeter Load Test..."
          ls -l data/results.jtl

      - name: Run Security Scan (OWASP ZAP Mock)
        run: |
          # In a real scenario, you'd run: zap-cli quick-scan --self-contained http://target-url.com
          echo "Simulating OWASP ZAP Security Scan..."
          ls -l reports/zap_report.json

      - name: Run AI Engine Analysis
        run: |
          python ai_engine/anomaly.py
          python ai_engine/prediction.py
          python ai_engine/vuln_prioritizer.py

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "❌ ERROR: EC2_HOST secret is missing!"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "❌ ERROR: EC2_SSH_KEY secret is missing!"; exit 1; fi
          echo "✅ Secrets are present."

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure EC2 Directories Exist
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@"${{ secrets.EC2_HOST }}" "mkdir -p /home/ubuntu/ai-testing-platform/data /home/ubuntu/ai-testing-platform/reports"

      - name: Upload Results to EC2
        run: |
          echo "Uploading data/results.jtl..."
          scp -i ~/.ssh/id_rsa data/results.jtl ubuntu@"${{ secrets.EC2_HOST }}":/home/ubuntu/ai-testing-platform/data/
          
          echo "Uploading reports/zap_report.json..."
          scp -i ~/.ssh/id_rsa reports/zap_report.json ubuntu@"${{ secrets.EC2_HOST }}":/home/ubuntu/ai-testing-platform/reports/
          
          echo "✅ All results synced to EC2 Dashboard!"
