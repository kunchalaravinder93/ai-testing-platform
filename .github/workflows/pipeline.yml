name: AI Testing Intelligence Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  intelligence-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Debug - List Files
        run: ls -R

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn semgrep

      - name: Run Performance Test (JMeter Mock)
        run: |
          echo "Simulating JMeter Load Test..."
          ls -l data/results.jtl

      - name: Run SAST Security Scan (Semgrep)
        run: |
          echo "Running Full OWASP Top 10 Security Scan..."
          semgrep scan --config auto --json --output reports/scan_results.json || true

      - name: Run DAST Security Awareness (Mock ZAP Output)
        run: |
          echo "Simulating OWASP ZAP scan for the real dashboard..."
          # In a real environment, ZAP would run here. 
          # For the pipeline flow, we verify if a zap report was generated by an external trigger.
          ls -l reports/zap_report.json || echo "{}" > reports/zap_report.json

      - name: Run AI Engine Analysis
        run: |
          python ai_engine/anomaly.py
          python ai_engine/prediction.py
          python ai_engine/vuln_prioritizer.py reports/scan_results.json reports/zap_report.json

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload Real Audit to EC2
        run: |
          echo "Uploading real scan results..."
          scp -i ~/.ssh/id_rsa reports/scan_results.json ubuntu@"${{ secrets.EC2_HOST }}":/home/ubuntu/ai-testing-platform/reports/
          scp -i ~/.ssh/id_rsa reports/zap_report.json ubuntu@"${{ secrets.EC2_HOST }}":/home/ubuntu/ai-testing-platform/reports/
          echo "Uploading JMeter logs..."
          scp -i ~/.ssh/id_rsa data/results.jtl ubuntu@"${{ secrets.EC2_HOST }}":/home/ubuntu/ai-testing-platform/data/
          
          echo "✅ Enterprise Audit synced to EC2!"
